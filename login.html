<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AdvancedIns.ai CRM Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #050505; --accent: #00FFCC; --accent-dim: rgba(0,255,204,0.08); --text: #f0f0f0; --text-secondary: #888; --text-muted: #555; --border: #1a1a1a; --input-bg: #0d0d0d; --danger: #ff4757; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; background: rgba(5,5,5,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
    .logo-icon { position: relative; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
    .logo-icon-bg { position: absolute; inset: 0; background: var(--accent); opacity: 0.1; border-radius: 10px; }
    .logo-icon svg { position: relative; z-index: 1; }
    .nav-brand { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
    .nav-links { display: flex; align-items: center; gap: 36px; }
    .nav-links a { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-secondary); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-cta { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; background: var(--accent); color: #050505; border: none; padding: 10px 24px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; transition: all 0.3s; }
    .nav-cta:hover { background: #00e0b4; }
    @keyframes revealUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    .reveal-up { animation: revealUp 0.8s cubic-bezier(0.16,1,0.3,1) forwards; }
    .d1 { animation: revealUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; opacity: 0; }
    .d2 { animation: revealUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards; opacity: 0; }
    .d3 { animation: revealUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards; opacity: 0; }
    .d4 { animation: revealUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.4s forwards; opacity: 0; }
    .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 120px 24px 60px; position: relative; z-index: 1; }
    .login-card { width: 100%; max-width: 440px; position: relative; }
    .login-card::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,255,204,0.06) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: -1; }
    .login-header { text-align: center; margin-bottom: 48px; }
    .login-header h1 { font-family: 'Syncopate', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; }
    .accent-line { width: 48px; height: 2px; background: var(--accent); margin: 0 auto 16px; }
    .login-header p { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
    .login-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 14px 16px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 2px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
    .form-group input::placeholder { color: var(--text-muted); font-size: 13px; }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .btn-signin { width: 100%; padding: 16px; background: var(--accent); color: #050505; border: none; border-radius: 2px; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
    .btn-signin:hover { background: #00e0b4; box-shadow: 0 4px 24px rgba(0,255,204,0.3); }
    .btn-signin:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-message { background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.25); color: var(--danger); padding: 12px 16px; border-radius: 2px; font-size: 13px; text-align: center; display: none; }
    .error-message.visible { display: block; }
    .login-footer { text-align: center; margin-top: 40px; padding-top: 28px; border-top: 1px solid var(--border); }
    .login-footer p { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #050505; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) { nav { padding: 16px 20px; } .nav-links { display: none; } .login-header h1 { font-size: 22px; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <div class="logo-icon"><div class="logo-icon-bg"></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <span class="nav-brand">AdvancedIns.ai</span>
    </a>
    <div class="nav-links">
      <a href="index.html#coverages">COVERAGES</a>
      <a href="commercial.html">COMMERCIAL</a>
      <a href="about.html">ABOUT</a>
    </div>
    <button class="nav-cta" onclick="window.location='quote.html'">GET QUOTED <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></button>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header reveal-up">
        <h1>Sign In</h1>
        <div class="accent-line"></div>
        <p>CRM Portal Access</p>
      </div>
      <form class="login-form" id="loginForm">
        <div class="form-group d1">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@advancedins.ai" required autocomplete="email" />
        </div>
        <div class="form-group d2">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
        </div>
        <div id="errorMsg" class="error-message d3"></div>
        <div class="d3">
          <button type="submit" class="btn-signin" id="btnSignin">SIGN IN</button>
        </div>
      </form>
      <div class="login-footer d4">
        <p>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;opacity:0.6"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Internal CRM Portal — Authorized Personnel Only
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Wait for DOM and Supabase SDK to be ready
    document.addEventListener('DOMContentLoaded', function() {
      const SUPABASE_URL = 'https://cqijyhudfiteivejcgox.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxaWp5aHVkZml0ZWl2ZWpjZ294Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzI5OTUsImV4cCI6MjA4OTI0ODk5NX0.08wZTXZSQvB98VEKCMLVc0EcuxleNVSOF5Fg0eKENHI';

      let sb;
      try {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase client initialized');
      } catch(e) {
        console.error('Failed to init Supabase:', e);
        return;
      }

      // Check existing session
      sb.auth.getSession().then(function(result) {
        if (result.data && result.data.session) {
          console.log('Existing session found, redirecting...');
          window.location.href = 'portal.html';
        }
      });

      // Handle form submit
      var form = document.getElementById('loginForm');
      var btn = document.getElementById('btnSignin');
      var errorEl = document.getElementById('errorMsg');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        console.log('Form submitted');

        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        if (!email || !password) {
          errorEl.textContent = 'Please enter both email and password.';
          errorEl.classList.add('visible');
          return;
        }

        // Reset error
        errorEl.classList.remove('visible');
        errorEl.textContent = '';

        // Disable button
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>SIGNING IN...';

        try {
          console.log('Attempting sign in for:', email);
          var result = await sb.auth.signInWithPassword({
            email: email,
            password: password
          });

          console.log('Auth result:', result);

          if (result.error) {
            throw result.error;
          }

          console.log('Login successful! Redirecting...');
          window.location.href = 'portal.html';

        } catch (err) {
          console.error('Login error:', err);
          errorEl.textContent = err.message || 'Authentication failed. Please try again.';
          errorEl.classList.add('visible');
          btn.disabled = false;
          btn.innerHTML = 'SIGN IN';
        }
      });
    });
  </script>
</body>
</html>
