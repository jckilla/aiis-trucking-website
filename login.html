<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AdvancedIns.ai CRM Portal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #050505; --bg-card: #0a0a0a; --accent: #00FFCC; --accent-dim: rgba(0, 255, 204, 0.08); --accent-border: rgba(0, 255, 204, 0.25); --accent-glow: rgba(0, 255, 204, 0.4); --text: #f0f0f0; --text-secondary: #888888; --text-muted: #555555; --border: #1a1a1a; --input-bg: #0d0d0d; --danger: #ff4757; }
    .cursor-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 99999; transition: transform 0.1s ease; mix-blend-mode: difference; }
    .cursor-ring { width: 36px; height: 36px; border: 1.5px solid var(--accent); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 99998; transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease, border-color 0.3s ease; opacity: 0.5; }
    .cursor-ring.hover { width: 50px; height: 50px; border-color: var(--accent); opacity: 0.8; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; cursor: none; position: relative; }
    body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
    .logo-icon { position: relative; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
    .logo-icon-bg { position: absolute; inset: 0; background: var(--accent); opacity: 0.1; border-radius: 10px; transition: opacity 0.3s ease; }
    .nav-logo:hover .logo-icon-bg { opacity: 0.2; }
    .logo-icon svg { position: relative; z-index: 1; }
    .nav-brand { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
    .nav-links { display: flex; align-items: center; gap: 36px; }
    .nav-links a { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-secondary); text-decoration: none; transition: color 0.3s ease; position: relative; }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s ease; }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; background: var(--accent); color: #050505; border: none; padding: 10px 24px; border-radius: 0; cursor: none; display: flex; align-items: center; gap: 8px; font-weight: 700; transition: all 0.3s ease; }
    .nav-cta:hover { background: #00e0b4; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0, 255, 204, 0.25); }
    @keyframes revealUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    .reveal-up { animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .reveal-up-delay-1 { animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards; opacity: 0; }
    .reveal-up-delay-2 { animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; opacity: 0; }
    .reveal-up-delay-3 { animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards; opacity: 0; }
    .reveal-up-delay-4 { animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards; opacity: 0; }
    .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 120px 24px 60px; position: relative; z-index: 1; }
    .login-card { width: 100%; max-width: 440px; position: relative; }
    .login-card::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; background: radial-gradient(circle, rgba(0, 255, 204, 0.06) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: -1; }
    .login-header { text-align: center; margin-bottom: 48px; }
    .login-header h1 { font-family: 'Syncopate', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--text); margin-bottom: 12px; }
    .login-header .accent-line { width: 48px; height: 2px; background: var(--accent); margin: 0 auto 16px; }
    .login-header p { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
    .login-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { position: relative; }
    .form-group label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-secondary); display: block; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 14px 16px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 2px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: border-color 0.3s ease, box-shadow 0.3s ease; cursor: none; }
    .form-group input::placeholder { color: var(--text-muted); font-size: 13px; }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px rgba(0, 255, 204, 0.08); }
    .btn-signin { width: 100%; padding: 16px; background: var(--accent); color: #050505; border: none; border-radius: 2px; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; cursor: none; transition: all 0.3s ease; position: relative; overflow: hidden; margin-top: 8px; }
    .btn-signin::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transition: left 0.5s ease; }
    .btn-signin:hover { background: #00e0b4; transform: translateY(-1px); box-shadow: 0 4px 24px rgba(0, 255, 204, 0.3); }
    .btn-signin:hover::before { left: 100%; }
    .btn-signin:active { transform: translateY(0); }
    .btn-signin:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .error-message { background: rgba(255, 71, 87, 0.08); border: 1px solid rgba(255, 71, 87, 0.25); color: var(--danger); padding: 12px 16px; border-radius: 2px; font-size: 13px; font-family: 'Inter', sans-serif; text-align: center; display: none; }
    .error-message.visible { display: block; }
    .login-footer { text-align: center; margin-top: 40px; padding-top: 28px; border-top: 1px solid var(--border); }
    .login-footer p { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
    .login-footer .lock-icon { display: inline-block; margin-right: 6px; opacity: 0.6; }
    @media (max-width: 768px) { nav { padding: 16px 20px; } .nav-links { display: none; } .login-header h1 { font-size: 22px; letter-spacing: 3px; } .login-card { max-width: 100%; } .cursor-dot, .cursor-ring { display: none; } body { cursor: auto; } .form-group input, .btn-signin, .nav-cta { cursor: auto; } }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #050505; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>
  <nav>
    <a href="index.html" class="nav-logo hover-target">
      <div class="logo-icon"><div class="logo-icon-bg"></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <span class="nav-brand">AdvancedIns.ai</span>
    </a>
    <div class="nav-links">
      <a href="index.html#coverages" class="hover-target">COVERAGES</a>
      <a href="commercial.html" class="hover-target">COMMERCIAL</a>
      <a href="about.html" class="hover-target">ABOUT</a>
    </div>
    <button class="nav-cta hover-target" onclick="window.location='quote.html'">GET QUOTED <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></button>
  </nav>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header reveal-up">
        <h1>Sign In</h1>
        <div class="accent-line"></div>
        <p>CRM Portal Access</p>
      </div>
      <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group reveal-up-delay-1">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@advancedins.ai" required autocomplete="email" />
        </div>
        <div class="form-group reveal-up-delay-2">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
        </div>
        <div id="error-message" class="error-message reveal-up-delay-3"></div>
        <div class="reveal-up-delay-3">
          <button type="submit" class="btn-signin" id="btn-signin">SIGN IN</button>
        </div>
      </form>
      <div class="login-footer reveal-up-delay-4">
        <p><span class="lock-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span> Internal CRM Portal — Authorized Personnel Only</p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://cqijyhudfiteivejcgox.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxaWp5aHVkZml0ZWl2ZWpjZ294Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzI5OTUsImV4cCI6MjA4OTI0ODk5NX0.08wZTXZSQvB98VEKCMLVc0EcuxleNVSOF5Fg0eKENHI';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    (async function checkSession() { const { data: { session } } = await supabase.auth.getSession(); if (session) { window.location.href = 'portal.html'; } })();
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-signin');
      const errorEl = document.getElementById('error-message');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      errorEl.classList.remove('visible'); errorEl.textContent = '';
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>SIGNING IN...';
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'portal.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Authentication failed. Please try again.';
        errorEl.classList.add('visible');
        btn.disabled = false; btn.innerHTML = 'SIGN IN';
      }
    }
    const dot = document.getElementById('cursor-dot'); const ring = document.getElementById('cursor-ring');
    let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
    document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; dot.style.transform = `translate(${mouseX - 4}px, ${mouseY - 4}px)`; });
    function animateRing() { ringX += (mouseX - ringX) * 0.15; ringY += (mouseY - ringY) * 0.15; ring.style.transform = `translate(${ringX - 18}px, ${ringY - 18}px)`; requestAnimationFrame(animateRing); }
    animateRing();
    document.querySelectorAll('.hover-target, a, button, input').forEach(el => { el.addEventListener('mouseenter', () => ring.classList.add('hover')); el.addEventListener('mouseleave', () => ring.classList.remove('hover')); });
  </script>
</body>
</html>
